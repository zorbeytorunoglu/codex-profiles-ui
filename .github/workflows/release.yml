name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or recover (for example, v0.3.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  tag-check:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: release
        name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag }}"
          fi

          [[ -n "${tag}" ]] || { echo "Missing release tag"; exit 1; }
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?$ ]] \
            || { echo "Tag '${tag}' does not match vX.Y.Z or vX.Y.Z-alpha.N"; exit 1; }

          checked_out_tag="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          [[ "${checked_out_tag}" == "${tag}" ]] \
            || { echo "Checked out ref does not match tag ${tag}"; exit 1; }

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          if [[ "${tag}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches versions
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *\"([^\"]+)\".*/\1/')"
          npm_ver="$(python3 - <<'PY'
          import json
          with open("package.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["version"])
          PY
          )"

          echo "Tag: ${RELEASE_TAG}"
          echo "Tag version: ${RELEASE_VERSION}"
          echo "Cargo version: ${cargo_ver}"
          echo "NPM version: ${npm_ver}"

          [[ "${RELEASE_VERSION}" == "${cargo_ver}" ]] || { echo "Tag ${RELEASE_VERSION} != Cargo.toml ${cargo_ver}"; exit 1; }
          [[ "${RELEASE_VERSION}" == "${npm_ver}" ]] || { echo "Tag ${RELEASE_VERSION} != package.json ${npm_ver}"; exit 1; }

  verify:
    needs: tag-check
    runs-on: ubuntu-24.04
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy
      - uses: taiki-e/install-action@aba36d755ec7ca22d38b12111787c26115943952 # v2
        with:
          tool: cargo-audit@0.22.1
      - uses: taiki-e/install-action@aba36d755ec7ca22d38b12111787c26115943952 # v2
        with:
          tool: cargo-nextest@0.9.129
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-verify-${{ hashFiles('rust-toolchain.toml') }}
      - name: Run checks
        run: scripts/check.sh

  build:
    needs: [tag-check, verify]
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: codex-profiles
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: codex-profiles
          - runner: macos-15-large
            target: x86_64-apple-darwin
            binary: codex-profiles
          - runner: macos-15
            target: aarch64-apple-darwin
            binary: codex-profiles
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            binary: codex-profiles.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        continue-on-error: true
        with:
          shared-key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}
      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked
          cargo build --release --target ${{ matrix.target }} --bin codex-profiles --locked
          echo "Build output:"
          ls -la target/${{ matrix.target }}/release || true
      - name: Upload binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: codex-profiles-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  package:
    needs: [tag-check, build, verify]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.tag-check.outputs.tag }}
      - id: metadata
        name: Resolve publish metadata
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import tomllib
          from pathlib import Path

          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          repository = package["repository"]
          repository_url = repository if isinstance(repository, str) else repository["url"]
          repository_url = (
              repository_url.removeprefix("git+")
              .removesuffix(".git")
              .rstrip("/")
          )
          prefix = "https://github.com/"
          if not repository_url.startswith(prefix):
              raise SystemExit(f"Unsupported repository URL: {repository_url}")

          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))

          print(f"expected_repository={repository_url[len(prefix):]}")
          print(f"root_npm_package_name={package['name']}")
          print(f"cargo_package_name={cargo['package']['name']}")
          PY
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 24.14.0
          registry-url: https://registry.npmjs.org
      - name: Cache cargo bin
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        continue-on-error: true
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-cargo-bin
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/artifacts
      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.version }}"
          scripts/release-artifacts.sh "${version}" dist/artifacts dist
          scripts/verify-artifacts.sh "${version}" dist

      - name: Capture tagged source revision
        shell: bash
        run: |
          set -euo pipefail
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Generate artifact attestations
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/release/*
            dist/npm-packages/*.tgz
            dist/homebrew/*.rb
            dist/cargo/*.crate
            dist/checksums/*

      - name: Commit checksums to repo
        shell: bash
        env:
          EXPECTED_REPOSITORY: ${{ steps.metadata.outputs.expected_repository }}
        run: |
          set -euo pipefail
          version="${{ needs.tag-check.outputs.version }}"

          # Safety gate: only commit to the configured release repository
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "Skipping checksum commit: not release repository (current: ${GITHUB_REPOSITORY}, expected: ${EXPECTED_REPOSITORY})"
            echo "Checksums generated but not committed to repo"
            ls -la dist/checksums/
            exit 0
          fi

          echo "Committing checksums to ${GITHUB_REPOSITORY}..."

          # Copy checksums to repo
          cp dist/checksums/SHA256SUMS "checksums/v${version}.txt"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch and checkout main branch (workflow starts in detached HEAD from tag)
          git fetch origin main
          git checkout main

          # Commit and push
          git add "checksums/v${version}.txt"
          if git diff --cached --quiet; then
            echo "Checksum file already committed; nothing to do"
            exit 0
          fi
          git commit -m "chore: add checksums for v${version}"
          git push origin main

      - name: Restore tagged source for crates.io publish
        if: ${{ needs.tag-check.outputs.prerelease != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${RELEASE_SHA}"

      - name: Publish to crates.io
        if: ${{ needs.tag-check.outputs.prerelease != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          EXPECTED_REPOSITORY: ${{ steps.metadata.outputs.expected_repository }}
          CARGO_PACKAGE_NAME: ${{ steps.metadata.outputs.cargo_package_name }}
          PUBLISH_CRATES: ${{ vars.PUBLISH_CRATES }}
        run: |
          set -euo pipefail

          if [[ "${PUBLISH_CRATES}" != "true" ]]; then
            echo "Skipping crates.io publish: repository variable PUBLISH_CRATES is not true"
            exit 0
          fi

          # Safety gate: only publish from the configured release repository
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "Skipping crates.io publish: not release repository (current: ${GITHUB_REPOSITORY}, expected: ${EXPECTED_REPOSITORY})"
            exit 0
          fi

          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "Warning: CARGO_REGISTRY_TOKEN not set, skipping crates.io publish"
            echo "Add your token at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi

          version="${{ needs.tag-check.outputs.version }}"
          if curl -fsS "https://crates.io/api/v1/crates/${CARGO_PACKAGE_NAME}/${version}" >/dev/null 2>&1; then
            echo "${CARGO_PACKAGE_NAME} ${version} is already published to crates.io; skipping"
            exit 0
          fi

          echo "Publishing to crates.io from ${GITHUB_REPOSITORY}..."
          cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

      - name: Publish to npm
        if: ${{ needs.tag-check.outputs.prerelease != 'true' }}
        env:
          EXPECTED_REPOSITORY: ${{ steps.metadata.outputs.expected_repository }}
          ROOT_NPM_PACKAGE_NAME: ${{ steps.metadata.outputs.root_npm_package_name }}
        run: |
          set -euo pipefail
          # Safety gate: only publish from the configured release repository
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "Skipping npm publish: not release repository (current: ${GITHUB_REPOSITORY}, expected: ${EXPECTED_REPOSITORY})"
            exit 0
          fi

          echo "Publishing to npm from ${GITHUB_REPOSITORY} via trusted publishing..."
          node --version
          npm_version="$(npm --version)"
          echo "npm ${npm_version}"
          python3 - "${npm_version}" <<'PY'
          import sys

          required = (11, 5, 1)
          got = tuple(int(part) for part in sys.argv[1].split(".")[:3])
          if got < required:
              raise SystemExit(
                  f"npm {sys.argv[1]} is too old for trusted publishing; need >= 11.5.1"
              )
          PY
          version="${{ needs.tag-check.outputs.version }}"

          package_name() {
            tar -xOzf "$1" package/package.json \
              | python3 -c 'import json, sys; print(json.load(sys.stdin)["name"])'
          }

          publish_if_missing() {
            local pkg="$1"
            local name
            name="$(package_name "$pkg")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping npm publish for ${name}@${version}: already published"
              return 0
            fi

            npm publish "$pkg" --access public --provenance
          }

          root_pkg=""
          platform_pkgs=()
          shopt -s nullglob
          for pkg in dist/npm-packages/*.tgz; do
            name="$(package_name "$pkg")"
            if [[ "${name}" == "${ROOT_NPM_PACKAGE_NAME}" ]]; then
              root_pkg="${pkg}"
            else
              platform_pkgs+=("${pkg}")
            fi
          done
          shopt -u nullglob

          [[ ${#platform_pkgs[@]} -gt 0 ]] || { echo "No platform npm packages found"; exit 1; }
          [[ -n "${root_pkg}" ]] || { echo "Root npm package tarball not found"; exit 1; }

          # Publish platform packages first so optionalDependencies can resolve.
          for pkg in "${platform_pkgs[@]}"; do
            publish_if_missing "$pkg"
          done

          publish_if_missing "${root_pkg}"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.tag-check.outputs.tag }}
          files: |
            dist/release/*
            dist/npm-packages/*.tgz
            dist/homebrew/*.rb
            dist/cargo/*.crate
            dist/checksums/*
          generate_release_notes: true
          prerelease: ${{ needs.tag-check.outputs.prerelease == 'true' }}
